<!DOCTYPE html>
<html lang="es">
  <head>

    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <link rel="icon" href="icons/Logo_cobol.png">
    <link rel="manifest" href="manifest.json">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <!-- Pannellum 360° Viewer -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pannellum/build/pannellum.css">

    <link rel="canonical" href="https://bolivia-turismo.com/">
    <meta name="theme-color" content="#0f8b8d">
    <meta name="color-scheme" content="light dark">
    <link rel="apple-touch-icon" href="icons/tucan_c.svg">
    
    <!-- SEO Meta Tags -->
    <title>Bolivia Turismo - Descubre los lugares más increíbles de Bolivia</title>
    <meta name="description" content="Explora Bolivia: Salar de Uyuni, Tiwanaku, Lago Titicaca y más destinos únicos. Guía completa de turismo en Bolivia.">

    <meta name="author" content="Bolivia Turismo">
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://bolivia-turismo.com/">
    <meta property="og:title" content="Bolivia Turismo - Descubre los lugares más increíbles">
    <meta property="og:description" content="Explora Bolivia: Salar de Uyuni, Tiwanaku, Lago Titicaca y más destinos únicos.">
    <meta property="og:image" content="images/canaval.jpg">
    
    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image">
    <meta property="twitter:url" content="https://bolivia-turismo.com/">
    <meta property="twitter:title" content="Bolivia Turismo - Descubre los lugares más increíbles">
    <meta property="twitter:description" content="Explora Bolivia: Salar de Uyuni, Tiwanaku, Lago Titicaca y más destinos únicos.">
    <meta property="twitter:image" content="images/canaval.jpg">
    
    <!-- Geo Tags -->
    <meta name="geo.region" content="BO">
    <meta name="geo.placename" content="Bolivia">
    <meta name="geo.position" content="-16.5;-68.15">
    <meta name="ICBM" content="-16.5, -68.15">
